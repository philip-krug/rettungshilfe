<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#cc0000">
<title>FF Messel – Einsatz</title>
<style>
  :root {
    --rot: #cc0000;
    --rot-dunkel: #990000;
    --rot-hell: #ff2222;
    --schwarz: #0a0a0a;
    --dunkel: #141414;
    --dunkel2: #1e1e1e;
    --dunkel3: #2a2a2a;
    --grau: #888;
    --hell: #f0f0f0;
    --weiss: #ffffff;
    --gelb: #ffcc00;
    --gruen: #22aa44;
    --radius: 12px;
    --radius-gross: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--schwarz);
    color: var(--weiss);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 18px;
    line-height: 1.4;
    overscroll-behavior: none;
  }

  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 600px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    background: var(--rot);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    width: 36px;
    height: 36px;
    background: var(--weiss);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: var(--rot);
    flex-shrink: 0;
    letter-spacing: -1px;
  }
  .header-title {
    flex: 1;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .header-sub {
    font-size: 11px;
    font-weight: 400;
    opacity: 0.85;
    letter-spacing: 0.3px;
  }
  .btn-zurueck {
    background: rgba(255,255,255,0.2);
    border: none;
    color: var(--weiss);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-start {
    background: rgba(255,255,255,0.15);
    border: none;
    color: var(--weiss);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-start:active, .btn-zurueck:active { opacity: 0.7; }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .screen-titel {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--grau);
    margin-bottom: 4px;
    padding: 0 4px;
  }

  /* GROSSE BUTTONS – Screen 1 */
  .btn-einsatz {
    background: var(--dunkel2);
    border: 2px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    padding: 22px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    width: 100%;
  }
  .btn-einsatz:active {
    background: var(--dunkel3);
    border-color: var(--rot);
  }
  .btn-einsatz-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .icon-vh  { background: #1a3a2a; }
  .icon-f   { background: #3a1a1a; }
  .icon-vu  { background: #3a2a1a; }
  .icon-th  { background: #1a2a3a; }
  .icon-wiki{ background: #2a2a3a; }
  .btn-einsatz-text {}
  .btn-einsatz-kurz {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--weiss);
  }
  .btn-einsatz-lang {
    font-size: 15px;
    font-weight: 500;
    color: var(--grau);
    margin-top: 3px;
  }
  .btn-einsatz-fzg {
    font-size: 12px;
    color: var(--rot-hell);
    margin-top: 4px;
    font-weight: 600;
  }
  .btn-einsatz-pfeil {
    margin-left: auto;
    color: var(--grau);
    font-size: 22px;
    flex-shrink: 0;
  }

  /* POSITIONS-BUTTONS – Screen 2 */
  .grid-positionen {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .btn-position {
    background: var(--dunkel2);
    border: 2px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    padding: 20px 16px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .btn-position:active {
    background: var(--dunkel3);
    border-color: var(--rot);
  }
  .btn-position.alle {
    grid-column: 1 / -1;
    background: var(--rot-dunkel);
    border-color: var(--rot);
    padding: 22px 16px;
  }
  .btn-position.alle:active {
    background: var(--rot);
  }
  .pos-kurz {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--weiss);
    line-height: 1;
  }
  .pos-lang {
    font-size: 13px;
    color: var(--grau);
    margin-top: 5px;
    font-weight: 500;
  }
  .btn-position.alle .pos-kurz { font-size: 24px; letter-spacing: 0; }
  .btn-position.alle .pos-lang { color: rgba(255,255,255,0.75); }

  /* INFO-BOX Fahrzeug */
  .info-fahrzeug {
    background: var(--dunkel2);
    border-left: 4px solid var(--rot);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--grau);
    margin-bottom: 4px;
  }
  .info-fahrzeug strong {
    color: var(--weiss);
    display: block;
    font-size: 15px;
    margin-bottom: 2px;
  }

  /* AUFGABEN – Screen 3 */
  .aufgaben-header {
    background: var(--dunkel2);
    border-radius: var(--radius-gross);
    padding: 18px 20px;
    margin-bottom: 4px;
    border-left: 5px solid var(--rot);
  }
  .aufgaben-header-kurz {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--rot-hell);
  }
  .aufgaben-header-pos {
    font-size: 24px;
    font-weight: 900;
    color: var(--weiss);
    margin-top: 2px;
  }

  .aufgaben-gruppe {
    background: var(--dunkel2);
    border-radius: var(--radius-gross);
    overflow: hidden;
    border: 1px solid var(--dunkel3);
  }
  .aufgaben-gruppe-titel {
    background: var(--dunkel3);
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--rot-hell);
    border-bottom: 1px solid var(--schwarz);
  }

  .aufgabe-item {
    display: flex;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--dunkel3);
    align-items: flex-start;
  }
  .aufgabe-item:last-child { border-bottom: none; }
  .aufgabe-nr {
    width: 30px;
    height: 30px;
    background: var(--rot-dunkel);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    color: var(--weiss);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .aufgabe-inhalt { flex: 1; }
  .aufgabe-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--weiss);
    line-height: 1.35;
  }
  .aufgabe-merksatz {
    margin-top: 8px;
    background: var(--dunkel3);
    border-left: 3px solid var(--gelb);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 700;
    color: var(--gelb);
    letter-spacing: 0.3px;
  }

  /* WIKI */
  .wiki-search-wrap {
    position: relative;
    margin-bottom: 4px;
  }
  .wiki-search {
    width: 100%;
    background: var(--dunkel2);
    border: 2px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    padding: 16px 20px;
    font-size: 18px;
    color: var(--weiss);
    outline: none;
    font-family: inherit;
  }
  .wiki-search:focus { border-color: var(--rot); }
  .wiki-search::placeholder { color: var(--grau); }

  .wiki-liste {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .wiki-eintrag {
    background: var(--dunkel2);
    border: 1px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    overflow: hidden;
    cursor: pointer;
  }
  .wiki-eintrag-header {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .wiki-eintrag-titel {
    font-size: 18px;
    font-weight: 700;
    color: var(--weiss);
  }
  .wiki-eintrag-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 5px;
  }
  .wiki-tag {
    background: var(--dunkel3);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--grau);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .wiki-pfeil {
    color: var(--grau);
    font-size: 20px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .wiki-eintrag.offen .wiki-pfeil { transform: rotate(90deg); }
  .wiki-eintrag.offen { border-color: var(--rot); }
  .wiki-inhalt {
    display: none;
    padding: 0 20px 20px;
    font-size: 16px;
    color: var(--hell);
    line-height: 1.6;
    white-space: pre-line;
    border-top: 1px solid var(--dunkel3);
    padding-top: 16px;
  }
  .wiki-eintrag.offen .wiki-inhalt { display: block; }

  /* LEER-ZUSTAND */
  .leer {
    text-align: center;
    color: var(--grau);
    padding: 40px 20px;
    font-size: 16px;
  }

  /* ANIMATIONS */
  .fade-in {
    animation: fadeIn 0.2s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dunkel3); border-radius: 2px; }
</style>
</head>

// ── STATE ──────────────────────────────────────────────────────────────────────
let state = { screen: 'start', einsatzId: null, positionId: null };

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  const nav = document.getElementById('header-nav');
  content.className = 'content fade-in';
  // force reflow for animation
  void content.offsetWidth;

  // Header-Navigation
  nav.innerHTML = '';
  nav.style.display = 'flex';
  if (state.screen !== 'start') {
    if (state.screen === 'positionen' || state.screen === 'wiki') {
      const b = btn('← Zurück', () => { state = { screen: 'start', einsatzId: null, positionId: null }; render(); });
      b.className = 'btn-zurueck';
      nav.appendChild(b);
    }
    if (state.screen === 'aufgaben') {
      if (state.einsatzId === 'VH') {
        const b1 = btn('← Zurück', () => { state = { screen: 'start', einsatzId: null, positionId: null }; render(); });
        b1.className = 'btn-zurueck';
        nav.appendChild(b1);
      } else {
        const b1 = btn('← Position', () => { state.positionId = null; state.screen = 'positionen'; render(); });
        b1.className = 'btn-zurueck';
        const b2 = btn('Start', () => { state = { screen: 'start', einsatzId: null, positionId: null }; render(); });
        b2.className = 'btn-start';
        nav.appendChild(b1);
        nav.appendChild(b2);
      }
    }
  }

  // Screens
  if (state.screen === 'start')       renderStart(content);
  else if (state.screen === 'positionen') renderPositionen(content);
  else if (state.screen === 'aufgaben')   renderAufgaben(content);
  else if (state.screen === 'wiki')       renderWiki(content);
}

function renderStart(el) {
  el.innerHTML = '';
  el.appendChild(el_('div', { className: 'screen-titel' }, 'Einsatzstichwort wählen'));

  DATA.einsaetze.forEach(e => {
    const b = btn_einsatz(e);
    b.addEventListener('click', () => {
      if (e.id === 'VH') {
        // VH hat keine Positionsauswahl – direkt zu Aufgaben
        state = { screen: 'aufgaben', einsatzId: 'VH', positionId: 'ALLE' };
      } else {
        state = { screen: 'positionen', einsatzId: e.id, positionId: null };
      }
      render();
    });
    el.appendChild(b);
  });

  // Wiki
  const bw = document.createElement('button');
  bw.className = 'btn-einsatz';
  bw.innerHTML = `
    <div class="btn-einsatz-icon icon-wiki">📖</div>
    <div class="btn-einsatz-text">
      <div class="btn-einsatz-kurz">WIKI</div>
      <div class="btn-einsatz-lang">Begriffe & Merksätze nachschlagen</div>
    </div>
    <div class="btn-einsatz-pfeil">›</div>`;
  bw.addEventListener('click', () => { state = { screen: 'wiki', einsatzId: null, positionId: null }; render(); });
  el.appendChild(bw);
}

function renderPositionen(el) {
  el.innerHTML = '';
  const einsatz = DATA.einsaetze.find(e => e.id === state.einsatzId);
  if (!einsatz) return;

  // Fahrzeug-Info
  const info = document.createElement('div');
  info.className = 'info-fahrzeug';
  info.innerHTML = `<strong>${einsatz.kurz} – ${einsatz.label}</strong>Fahrzeug: ${einsatz.fahrzeug}`;
  el.appendChild(info);

  el.appendChild(el_('div', { className: 'screen-titel' }, 'Meine Einsatzposition'));

  const grid = document.createElement('div');
  grid.className = 'grid-positionen';

  // ALLE zuerst
  const bAlle = document.createElement('button');
  bAlle.className = 'btn-position alle';
  bAlle.innerHTML = `<div class="pos-kurz">ALLE</div><div class="pos-lang">Übersicht aller Trupps</div>`;
  bAlle.addEventListener('click', () => {
    state.positionId = 'ALLE'; state.screen = 'aufgaben'; render();
  });
  grid.appendChild(bAlle);

  // Positionen aus Daten (ohne ALLE)
  const positionen = einsatz.id === 'VH'
    ? [{ id: 'ALLE', label: 'Alle' }]
    : [
        { id: 'MA', label: 'Maschinist' },
        { id: 'A',  label: 'Angriffstrupp' },
        { id: 'W',  label: 'Wassertrupp' },
        { id: 'S',  label: 'Schlauchtrupp' },
        { id: 'ME', label: 'Melder' }
      ];

  if (einsatz.id !== 'VH') {
    positionen.forEach(p => {
      const b = document.createElement('button');
      b.className = 'btn-position';
      b.innerHTML = `<div class="pos-kurz">${p.id}</div><div class="pos-lang">${p.label}</div>`;
      b.addEventListener('click', () => {
        state.positionId = p.id; state.screen = 'aufgaben'; render();
      });
      grid.appendChild(b);
    });
  }

  el.appendChild(grid);
}

function renderAufgaben(el) {
  el.innerHTML = '';
  const einsatz = DATA.einsaetze.find(e => e.id === state.einsatzId);
  if (!einsatz) return;

  const zeigeAlle = state.positionId === 'ALLE';
  const posLabel = zeigeAlle ? 'Alle Trupps' : (
    { MA: 'Maschinist', A: 'Angriffstrupp', W: 'Wassertrupp', S: 'Schlauchtrupp', ME: 'Melder' }[state.positionId] || state.positionId
  );

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'aufgaben-header';
  hdr.innerHTML = `<div class="aufgaben-header-kurz">${einsatz.kurz} – ${einsatz.label}</div>
    <div class="aufgaben-header-pos">${posLabel}</div>`;
  el.appendChild(hdr);

  if (zeigeAlle && einsatz.id === 'VH') {
    // VH: Aufgaben in thematische eingeklappte Karten gruppiert
    const gruppen = [
      { titel: '4-S-Regel – Einsatzbeginn',          aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr <= 4) },
      { titel: 'Erster Eindruck – 4-Sekunden-Regel', aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr === 5) },
      { titel: 'cABCDE – Patientenuntersuchung',      aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 6 && a.nr <= 11) },
      { titel: 'Leitstelle & Übergabe',               aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 12 && a.nr <= 19) },
      { titel: 'Schlaganfall erkennen & handeln',     aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 20) }
    ];
    gruppen.forEach(g => el.appendChild(aufgabenKarte(g.titel, g.aufgaben, false)));

  } else if (zeigeAlle) {
    // Alle Trupps als eingeklappte Karten
    einsatz.positionen.forEach(pos => {
      el.appendChild(aufgabenKarte(`${pos.id} – ${pos.label}`, pos.aufgaben, false));
    });
  } else {
    // Einzelne Position: Karte initial aufgeklappt
    const pos = einsatz.positionen.find(p => p.id === state.positionId);
    if (!pos) { el.appendChild(el_('div', { className: 'leer' }, 'Keine Daten für diese Position.')); return; }
    el.appendChild(aufgabenKarte(`${pos.id} – ${pos.label}`, pos.aufgaben, true));
  }
}

function renderWiki(el) {
  el.innerHTML = '';
  el.appendChild(el_('div', { className: 'screen-titel' }, 'Wiki – Begriffe & Merksätze'));

  const wrap = document.createElement('div');
  wrap.className = 'wiki-search-wrap';
  const input = document.createElement('input');
  input.className = 'wiki-search';
  input.type = 'search';
  input.placeholder = '🔍  Suchen …';
  wrap.appendChild(input);
  el.appendChild(wrap);

  const liste = document.createElement('div');
  liste.className = 'wiki-liste';
  el.appendChild(liste);

  function renderListe(filter) {
    liste.innerHTML = '';
    const eintraege = [...DATA.wiki]
      .sort((a, b) => a.titel.localeCompare(b.titel, 'de'))
      .filter(w => !filter || w.titel.toLowerCase().includes(filter) || w.tags.some(t => t.toLowerCase().includes(filter)));

    if (eintraege.length === 0) {
      liste.appendChild(el_('div', { className: 'leer' }, 'Keine Einträge gefunden.'));
      return;
    }
    eintraege.forEach(w => {
      const card = document.createElement('div');
      card.className = 'wiki-eintrag';
      card.innerHTML = `
        <div class="wiki-eintrag-header">
          <div>
            <div class="wiki-eintrag-titel">${w.titel}</div>
            <div class="wiki-eintrag-tags">${w.tags.map(t => `<span class="wiki-tag">${t}</span>`).join('')}</div>
          </div>
          <div class="wiki-pfeil">›</div>
        </div>
        <div class="wiki-inhalt">${w.inhalt}</div>`;
      card.querySelector('.wiki-eintrag-header').addEventListener('click', () => {
        card.classList.toggle('offen');
      });
      liste.appendChild(card);
    });
  }

  renderListe('');
  input.addEventListener('input', () => renderListe(input.value.toLowerCase().trim()));
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el_(tag, props, text) {
  const e = document.createElement(tag);
  Object.assign(e, props);
  if (text) e.textContent = text;
  return e;
}
function btn(text, onClick) {
  const b = document.createElement('button');
  b.textContent = text;
  b.addEventListener('click', onClick);
  return b;
}
function btn_einsatz(e) {
  const b = document.createElement('button');
  b.className = 'btn-einsatz';
  b.innerHTML = `
    <div class="btn-einsatz-icon ${e.iconKlasse}">${e.icon}</div>
    <div class="btn-einsatz-text">
      <div class="btn-einsatz-kurz">${e.kurz}</div>
      <div class="btn-einsatz-lang">${e.label}</div>
      <div class="btn-einsatz-fzg">${e.fahrzeug}</div>
    </div>
    <div class="btn-einsatz-pfeil">›</div>`;
  return b;
}
function aufgabenKarte(titel, aufgaben, initialOffen) {
  const card = document.createElement('div');
  card.className = 'wiki-eintrag' + (initialOffen ? ' offen' : '');
  const header = document.createElement('div');
  header.className = 'wiki-eintrag-header';
  header.innerHTML = `<div class="wiki-eintrag-titel">${titel}</div><div class="wiki-pfeil">›</div>`;
  const body = document.createElement('div');
  body.className = 'wiki-inhalt';
  body.style.padding = '0';
  aufgaben.forEach(a => body.appendChild(aufgabeEl(a)));
  header.addEventListener('click', () => card.classList.toggle('offen'));
  card.appendChild(header);
  card.appendChild(body);
  return card;
}
function aufgabeEl(a) {
  const div = document.createElement('div');
  div.className = 'aufgabe-item';
  div.innerHTML = `
    <div class="aufgabe-nr">${a.nr}</div>
    <div class="aufgabe-inhalt">
      <div class="aufgabe-text">${a.text}</div>
      ${a.merksatz ? `<div class="aufgabe-merksatz">▶ ${a.merksatz}</div>` : ''}
    </div>`;
  return div;
}
