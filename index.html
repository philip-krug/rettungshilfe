<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#cc0000">
<title>FF Messel – Einsatz</title>
<style>
  :root {
    --rot: #cc0000;
    --rot-dunkel: #990000;
    --rot-hell: #ff2222;
    --schwarz: #0a0a0a;
    --dunkel: #141414;
    --dunkel2: #1e1e1e;
    --dunkel3: #2a2a2a;
    --grau: #888;
    --hell: #f0f0f0;
    --weiss: #ffffff;
    --gelb: #ffcc00;
    --gruen: #22aa44;
    --radius: 12px;
    --radius-gross: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--schwarz);
    color: var(--weiss);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 18px;
    line-height: 1.4;
    overscroll-behavior: none;
  }

  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 600px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    background: var(--rot);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    width: 36px;
    height: 36px;
    background: var(--weiss);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: var(--rot);
    flex-shrink: 0;
    letter-spacing: -1px;
  }
  .header-title {
    flex: 1;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .header-sub {
    font-size: 11px;
    font-weight: 400;
    opacity: 0.85;
    letter-spacing: 0.3px;
  }
  .btn-zurueck {
    background: rgba(255,255,255,0.2);
    border: none;
    color: var(--weiss);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-start {
    background: rgba(255,255,255,0.15);
    border: none;
    color: var(--weiss);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-start:active, .btn-zurueck:active { opacity: 0.7; }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .screen-titel {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--grau);
    margin-bottom: 4px;
    padding: 0 4px;
  }

  /* GROSSE BUTTONS – Screen 1 */
  .btn-einsatz {
    background: var(--dunkel2);
    border: 2px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    padding: 22px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    width: 100%;
  }
  .btn-einsatz:active {
    background: var(--dunkel3);
    border-color: var(--rot);
  }
  .btn-einsatz-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .icon-vh  { background: #1a3a2a; }
  .icon-f   { background: #3a1a1a; }
  .icon-vu  { background: #3a2a1a; }
  .icon-th  { background: #1a2a3a; }
  .icon-wiki{ background: #2a2a3a; }
  .btn-einsatz-text {}
  .btn-einsatz-kurz {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--weiss);
  }
  .btn-einsatz-lang {
    font-size: 15px;
    font-weight: 500;
    color: var(--grau);
    margin-top: 3px;
  }
  .btn-einsatz-fzg {
    font-size: 12px;
    color: var(--rot-hell);
    margin-top: 4px;
    font-weight: 600;
  }
  .btn-einsatz-pfeil {
    margin-left: auto;
    color: var(--grau);
    font-size: 22px;
    flex-shrink: 0;
  }

  /* POSITIONS-BUTTONS – Screen 2 */
  .grid-positionen {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .btn-position {
    background: var(--dunkel2);
    border: 2px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    padding: 20px 16px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .btn-position:active {
    background: var(--dunkel3);
    border-color: var(--rot);
  }
  .btn-position.alle {
    grid-column: 1 / -1;
    background: var(--rot-dunkel);
    border-color: var(--rot);
    padding: 22px 16px;
  }
  .btn-position.alle:active {
    background: var(--rot);
  }
  .pos-kurz {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--weiss);
    line-height: 1;
  }
  .pos-lang {
    font-size: 13px;
    color: var(--grau);
    margin-top: 5px;
    font-weight: 500;
  }
  .btn-position.alle .pos-kurz { font-size: 24px; letter-spacing: 0; }
  .btn-position.alle .pos-lang { color: rgba(255,255,255,0.75); }

  /* INFO-BOX Fahrzeug */
  .info-fahrzeug {
    background: var(--dunkel2);
    border-left: 4px solid var(--rot);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--grau);
    margin-bottom: 4px;
  }
  .info-fahrzeug strong {
    color: var(--weiss);
    display: block;
    font-size: 15px;
    margin-bottom: 2px;
  }

  .aufgaben-header {
    padding: 4px 4px 8px;
  }
  .aufgaben-header-kurz {
    display: none;
  }
  .aufgaben-header-pos {
    display: none;
  }
  .aufgaben-header-titel {
    font-size: 32px;
    font-weight: 900;
    color: var(--rot);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .aufgaben-gruppe {
    background: var(--dunkel2);
    border-radius: var(--radius-gross);
    overflow: hidden;
    border: 1px solid var(--dunkel3);
  }
  .aufgaben-gruppe-titel {
    background: var(--dunkel3);
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--rot-hell);
    border-bottom: 1px solid var(--schwarz);
  }

  .aufgabe-item {
    display: flex;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--dunkel3);
    align-items: flex-start;
  }
  .aufgabe-item:last-child { border-bottom: none; }
  .aufgabe-nr {
    width: 30px;
    height: 30px;
    background: var(--rot-dunkel);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    color: var(--weiss);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .aufgabe-inhalt { flex: 1; }
  .aufgabe-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--weiss);
    line-height: 1.35;
  }
  .aufgabe-merksatz {
    margin-top: 8px;
    background: var(--dunkel3);
    border-left: 3px solid var(--gelb);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 700;
    color: var(--gelb);
    letter-spacing: 0.3px;
  }

  /* WIKI */
  .wiki-search-wrap {
    position: relative;
    margin-bottom: 4px;
  }
  .wiki-search {
    width: 100%;
    background: var(--dunkel2);
    border: 2px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    padding: 16px 20px;
    font-size: 18px;
    color: var(--weiss);
    outline: none;
    font-family: inherit;
  }
  .wiki-search:focus { border-color: var(--rot); }
  .wiki-search::placeholder { color: var(--grau); }

  .wiki-schliessen {
    display: block;
    width: 100%;
    padding: 12px 20px;
    background: transparent;
    border: none;
    border-top: 1px solid var(--dunkel3);
    color: var(--grau);
    font-size: 14px;
    font-weight: 600;
    text-align: right;
    cursor: pointer;
    border-radius: 0 0 var(--radius-gross) var(--radius-gross);
  }
  .wiki-schliessen:active { color: var(--rot); }
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .wiki-eintrag {
    background: var(--dunkel2);
    border: 1px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    overflow: hidden;
    cursor: pointer;
  }
  .wiki-eintrag-header {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .wiki-eintrag-titel {
    font-size: 18px;
    font-weight: 700;
    color: var(--weiss);
  }
  .wiki-eintrag-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 5px;
  }
  .wiki-tag {
    background: var(--dunkel3);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--grau);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .wiki-pfeil {
    color: var(--grau);
    font-size: 20px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .wiki-eintrag.offen .wiki-pfeil { transform: rotate(90deg); }
  .wiki-eintrag.offen { border-color: var(--rot); }
  .wiki-inhalt {
    display: none;
    padding: 0 20px 20px;
    font-size: 16px;
    color: var(--hell);
    line-height: 1.6;
    white-space: pre-line;
    border-top: 1px solid var(--dunkel3);
    padding-top: 16px;
  }
  .wiki-eintrag.offen .wiki-inhalt { display: block; }

  /* LEER-ZUSTAND */
  .leer {
    text-align: center;
    color: var(--grau);
    padding: 40px 20px;
    font-size: 16px;
  }

  /* ANIMATIONS */
  .fade-in {
    animation: fadeIn 0.2s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* INLINE WIKI-AUFKLAPPER */
  .aufgabe-wiki-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    background: var(--dunkel3);
    border: 1px solid var(--grau);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--grau);
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .aufgabe-wiki-btn:active { border-color: var(--rot); color: var(--rot); }
  .aufgabe-wiki-inline {
    display: none;
    margin-top: 10px;
    background: var(--dunkel3);
    border-left: 3px solid var(--rot);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    color: var(--hell);
    line-height: 1.6;
    white-space: pre-line;
  }
  .aufgabe-wiki-inline.offen { display: block; }
  .aufgabe-wiki-schliessen {
    display: block;
    margin-top: 10px;
    background: none;
    border: none;
    color: var(--grau);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: right;
    width: 100%;
  }

  /* STARTSEITEN-SUCHE */
  .start-suche-wrap {
    position: relative;
    margin-bottom: 4px;
  }
  .start-suche {
    width: 100%;
    background: var(--dunkel2);
    border: 2px solid var(--dunkel3);
    border-radius: var(--radius-gross);
    padding: 16px 20px;
    font-size: 18px;
    color: var(--weiss);
    outline: none;
    font-family: inherit;
  }
  .start-suche:focus { border-color: var(--rot); }
  .start-suche::placeholder { color: var(--grau); }
  .start-suche-ergebnis {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dunkel3); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <div class="header-logo">FF</div>
    <div>
      <div class="header-title">FF Messel</div>
      <div class="header-sub">Rettungshelfer</div>
    </div>
    <div id="header-nav" style="display:none; gap:8px; display:flex; align-items:center;"></div>
  </div>
  <div class="content fade-in" id="content"></div>
</div>

<script>
// ── DATEN ──────────────────────────────────────────────────────────────────────

  wiki: [
    { id: "4S_regel",     titel: "4-S-Regel – Einsatzbeginn",          tags: ["VH","Einsatzbeginn"],   inhalt: "1. SICHERN: Gefahren erkennen, Schutzausrüstung anlegen, Einsatzstelle absichern\n2. SICHTEN: Anzahl Patienten, Verletzungsmuster, Unfallmechanismus erfassen\n3. SPRECHEN: Patient ansprechen + Notruf 112 (5 W's)\n4. SCHÜTZEN: Hypothermie verhindern, Rettungsdecke, Umstehende fernhalten\n\nMerksatz: Erst sichern – dann anfassen!" },
    { id: "5W",           titel: "5 W – Notruf 112",                   tags: ["Notruf","Kommunikation"], inhalt: "WO ist der Notfall?\nWAS ist passiert?\nWIE VIELE Personen sind betroffen?\nWIE ist der Zustand der Verletzten?\nWARTEN auf Rückfragen der Leitstelle!\n\nGespräch NICHT auflegen bis die Leitstelle freigibt." },
    { id: "AIRBAG",       titel: "AIRBAG-Regel – Sicherheitssysteme",  tags: ["VU","TH","Sicherheit"], inhalt: "Nicht ausgelöste Airbags sind Gefahr – immer vom Schlimmsten ausgehen!\n\nA = Abstand halten:\n  30 cm Seitenairbag · 60 cm Fahrerairbag · 90 cm Beifahrerairbag\nI = Innenraum erkunden: Welche Airbags ausgelöst? Was kann zum Geschoss werden?\nR = Rettungskräfte warnen: RD, Polizei über nicht ausgelöste Airbags informieren\nB = Batteriemanagement: Zündung aus, Batterie abklemmen wenn erreichbar\n  Achtung: Steuergerät hat oft autonome Stromversorgung!\nA = Abnehmen der Innenraumverkleidung: Gasgeneratoren sichtbar machen\nG = Gefahren an Komponenten: Gurtstraffer, Überrollbügel beachten\n\nNicht in Airbag-Komponenten oder Gasgeneratoren hineinschneiden!\nAusgelöste Airbag-Säcke dürfen gefahrlos zerschnitten werden." },
    { id: "AUTO",         titel: "AUTO-Regel – Alternative Antriebe",  tags: ["VU","TH","Erkundung"],  inhalt: "Bei jedem VU-Einsatz: Fahrzeug auf alternative Antriebstechnik prüfen!\n\nA = Austretende Betriebsstoffe: Zischgeräusche, Gasgeruch, Lachenbildung?\nU = Unterboden erkunden: Gastanks, Hochvoltleitungen (orange), Batterien?\nT = Tankdeckel öffnen: QR-Code, mehrere Tankdeckel, alternative Betankung?\nO = Oberfläche absuchen: Kein Auspuff, Aufkleber, Überdruckventile?\n\nAUTO-Regel ergänzt das Rettungsdatenblatt – ersetzt es nicht!\nBei E-Fahrzeugen: Hochvoltsystem deaktivieren, orange Leitungen nicht berühren." },
    { id: "BEFAST",       titel: "BE-FAST – Schlaganfall erkennen",     tags: ["VH","Schlaganfall"],    inhalt: "B = Balance: Patient beobachten – Schwindel, Gangunsicherheit, Sturzneigung?\nE = Eyes: »Sehen Sie klar? Doppelbilder?« – Sehstörung, Gesichtsfeldausfall?\nF = Face: »Bitte lächeln Sie!« – Mundwinkel hängt einseitig ab?\nA = Arms: »Beide Arme ausstrecken, Augen zu, 10 Sek. halten!« – Arm sinkt ab?\nS = Speech: »Sagen Sie: Die Sonne scheint heute!« – verwaschen, falsch, fehlend?\nT = Time: Symptombeginn genau erfragen! Uhrzeit dokumentieren!\n\nMindestens 1 Zeichen positiv → Schlaganfall-Verdacht!\nSofort 112 → Stroke Unit voranmelden\n\nLagerung: Oberkörper 30–45° hoch, sitzend – NICHT flach!\nBlutdruck NICHT senken – keine weitere Maßnahme\nZeitfenster Lyse: 4,5 Stunden" },
    { id: "cABCDE",       titel: "cABCDE – Patientenuntersuchung",      tags: ["VH","VU","Patient"],    inhalt: "Reihenfolge einhalten – lebensbedrohliche Zustände zuerst!\n\nc = critical bleeding: Lebensbedrohliche Blutung sofort stoppen\n  → Tourniquet, Druckverband, Wundpacking, Hämostyptika\n\nA = Airway: Atemweg freimachen\n  → Inspektion, Esmarch-Handgriff, ggf. Guedel-/Wendl-Tubus\n\nB = Breathing: Atmung beurteilen\n  → Frequenz, Tiefe, SpO₂, Thorax-Inspektion\n  → O₂-Gabe, ggf. Thoraxdekompression\n\nC = Circulation: Kreislauf beurteilen\n  → Puls (Qualität, Frequenz), Rekapillarisierung, Hautkolorit, RR\n\nD = Disability: Neurologie\n  → GCS, Pupillen (Weite, Seitengleichheit, Lichtreaktion), Blutzucker\n\nE = Exposure: Entkleiden\n  → Gesamten Körper inspizieren, Hypothermie verhindern (Rettungsdecke)\n\nPriorität: c=1 · A=2 · B=3 · C=4 · D=5 · E=6\nSchema wird wiederholt durchlaufen (Reassessment)!" },
    { id: "fahrzeuge",    titel: "Fahrzeuge – FF Messel",               tags: ["Fahrzeug","Übersicht"], inhalt: "01/11-01 · ELW 1 → Voraushelfer (Standard)\n01/19-01 · MTF → Mannschaftstransport\n01/22-01 · TLF 16/25 → Feuer / Waldbrand (Einsatzstelle)\n01/24-01 · TLF 24/50 → Feuer / Waldbrand (Pendelverkehr)\n01/46-01 · HLF 20/20 → TH, VU, Feuer (Hauptfahrzeug)\n01/51-01 · RW 1 → TH / VU (nur Nachalarmierung)" },
    { id: "funkstatus",   titel: "Funkstatus",                          tags: ["Funk","Status"],        inhalt: "Status 1: Einsatzbereit auf Wache\nStatus 2: Einsatzbereit außerhalb Wache\nStatus 3: Wache verlassen / auf Anfahrt\nStatus 4: Ankunft am Einsatzort\nStatus 5: Sprechwunsch\nStatus 6: Nicht einsatzbereit\n\nHinweis: Statusnummern mit ILS Darmstadt-Dieburg abgleichen." },
    { id: "GCS",          titel: "Glasgow Coma Scale (GCS)",            tags: ["VH","Neurologie"],      inhalt: "Formel: GCS = Augen (E) + Sprache (V) + Motorik (M) · Maximum 15\n\nAugen (E):\n4 = spontan · 3 = auf Ansprache · 2 = auf Schmerzreiz · 1 = keine\n\nSprache (V):\n5 = orientiert · 4 = verwirrt · 3 = Wortsalat · 2 = unverständlich · 1 = keine\n\nMotorik (M):\n6 = Aufforderung befolgt · 5 = gezielte Abwehr · 4 = ungezielte Abwehr\n3 = Beugebewegungen · 2 = Streckbewegungen · 1 = keine\n\nInterpretation:\n15 = normal · 13–14 = leicht · 9–12 = mittelschwer\n≤8 = schwer → Atemweg sichern! · 3 = tiefes Koma\n\nHinweis: Bei Intubation verbale Komponente als »Vt« dokumentieren." },
    { id: "HITS",         titel: "H's & HITS – Ursachen Kreislaufstillstand", tags: ["VH","Reanimation"], inhalt: "Reversible Ursachen bei Herzstillstand immer parallel suchen!\n\nH's:\nHypovolämie · Hypoxie · Hypothermie · Hypo-/Hyperkaliämie · Hypoglykämie · H⁺-Azidose\n\nHITS (T's):\nHerzbeuteltamponade · Intoxikation · Thrombose Lunge · Thrombose Herz · Spannungspneumothorax\n\nDiagnostik parallel:\n→ Sono (FAST): Tamponade, Pneumothorax, Hypovolämie?\n→ EKG: Herzinfarkt, Hyperkaliämie?\n→ BGA: Azidose, Hypoxie, Elektrolyte?\n→ Anamnese: Intoxikation, Hypothermie, Trauma?\n\nOhne Behandlung der Grundursache keine erfolgreiche Reanimation!" },
    { id: "HLW_erw",      titel: "HLW – Erwachsene",                   tags: ["Reanimation","CPR"],    inhalt: "1. Keine Atmung → sofort 112 rufen\n2. 30 Kompressionen: Mitte Brustkorb, 5–6 cm tief, 100–120/min\n3. 2 Beatmungen: Kopf überstrecken, Nase zu, in Mund blasen\n4. Rhythmus: 30:2 – nicht unterbrechen\n5. AED sofort einsetzen wenn verfügbar\n\nMerksatz: Hart und schnell drücken – nicht aufhören!" },
    { id: "HLW_kind",     titel: "HLW – Kinder",                       tags: ["Reanimation","Kinder"], inhalt: "Zuerst 5 initiale Beatmungen, dann HLW!\n\nSäugling: 2 Daumen, Brustkorb umgreifen, 4 cm\nKleinkind (1–8 J.): 1 Handballen, 5 cm\nSchulkind (>8 J.): 2 Handballen, 5–6 cm\n\n1 Helfer: 30:2 · 2 Helfer: 15:2 · Frequenz: 100–120/min\n\nMerksatz: Beim Kind zuerst beatmen!" },
    { id: "igel",         titel: "i-gel – Atemwegshilfe",              tags: ["VH","Atemweg","CPR"],   inhalt: "Einsetzen wenn:\n→ Bewusstlos\n→ Kein Würgen / kein Schluckreflex\n→ GCS ≤ 8\n→ Atemstillstand oder Ateminsuffizienz\n\nNicht einsetzen wenn:\n→ Patient wach / reagiert\n→ Würgt oder hustet\n\nGröße:\n→ Kräftig/groß → 5\n→ Normal → 4\n→ Klein/leicht → 3\n\nMerksatz: »Wenn der Patient es nicht mehr merkt → i-gel rein.«" },
    { id: "krampfanfall",  titel: "Krampfanfall – Maßnahmen",          tags: ["VH","Krampf","Neurologie"], inhalt: "Während des Krampfes:\n→ Ruhe bewahren, Zeit stoppen\n→ Sturz verhindern, Umgebung sichern\n→ Nichts in den Mund einführen!\n→ Patient nicht festhalten\n→ O₂-Gabe, BZ messen\n\nNach dem Krampf:\n→ Stabile Seitenlage (Aspirationsschutz)\n→ Vitalzeichen überwachen\n\nMedikamente:\n0–5 min → abwarten\n>5 min → Midazolam nasal/i.v. (5–10 mg)\n>30 min → Status epilepticus → Notarzt!\n\nImmer einweisen bei:\nErster Anfall · Dauer >5 min · kein Wiedererlangen des Bewusstseins · Kind · Trauma · Schwangerschaft" },
    { id: "leiter",       titel: "Leitern – Fahrzeuge & Einsatz",      tags: ["Leiter","Fahrzeug"],    inhalt: "Verlastung (PRÜFEN wo markiert):\nHLF 20/20 → Steckleiter 4-teilig (bestätigt)\nHLF 20/20 → Schiebleiter 3-teilig (PRÜFEN)\nTLF 16/25 → Schiebleiter (PRÜFEN)\n\nGrundsätze (FwDV 10):\n→ Mindestens 1 m über Austrittsstelle hinausragen\n→ Nie über Auflagepunkt hinaus besteigen\n→ Elektrische Freileitungen: Sicherheitsabstand!\n→ Nach Benutzung: Sichtprüfung" },
    { id: "nachfordern",  titel: "Leitstelle / Nachfordern",           tags: ["Funk","Leitstelle"],    inhalt: "Leitstelle sofort informieren bei:\n→ Ankunft Einsatzort (Status 4)\n→ Lagemeldung: Patienten, Lage, Gefahren\n→ Jeder Lageänderung\n\nNachfordern sofort wenn:\n→ Herzstillstand / Reanimation\n→ Bewusstlosigkeit unbekannter Ursache\n→ Atemnot, Brustschmerz, Schlaganfall\n→ Mehrere Verletzte · Kind · Person eingeklemmt\n→ Keine Besserung · Lage eskaliert" },
    { id: "OPQRST",       titel: "OPQRST – Schmerzanamnese",           tags: ["VH","Anamnese","Schmerz"], inhalt: "O = On-Set: Wann hat der Schmerz begonnen?\nP = Provokation: Was löst den Schmerz aus / lindert ihn?\nQ = Qualität: Wie fühlt sich der Schmerz an? (stechend, dumpf, zerreißend, brennend?)\nR = Region: Wo ist der Schmerz? Strahlt er aus?\nS = Stärke: Schmerzskala 0–10 (0=kein Schmerz, 10=stärkster vorstellbarer Schmerz)\nT = Time: Wie lange besteht der Schmerz? Zeitlicher Verlauf?" },
    { id: "rettungsmodus",titel: "Rettungsmodus – Sofort / Schnell",   tags: ["VU","TH","Rettung"],    inhalt: "Sofortrettung:\n→ Bei unmittelbarer Lebensgefahr (Brand, Reanimation)\n→ Stabilisierung kann entfallen\n→ Absicherung + Brandschutz trotzdem immer!\n\nSchnelle Rettung:\n→ Schnellstmöglich unter Beachtung med. Aspekte\n→ Patient wenn möglich immobilisieren\n→ Zeitfenster mit RD abstimmen" },
    { id: "SAMPLE",       titel: "SAMPLE – Notfallanamnese",           tags: ["VH","VU","Anamnese"],   inhalt: "S = Symptome: Was hat der Patient?\nA = Allergien: Bekannte Allergien?\nM = Medikamente: Was nimmt der Patient?\nP = Patientengeschichte (Vorerkrankungen)\nL = Auslöser: Ereignis bewusst? Was hat er zuletzt gemacht?\nE = Letzte Mahlzeit: Wann, was gegessen/getrunken? Zusammenhang?\n\nStrukturierte Anamnese → strukturierte Übergabe → rettet Leben." },
    { id: "schock",       titel: "Schockformen – Erkennung & Maßnahmen", tags: ["VH","VU","Schock"],  inhalt: "Zeichen: blass · kalt · schweißig · schneller Puls · RR↓\n\nHypovolämisch: Blutung stoppen · Schocklagerung · Wärme · O₂\nKardiogen: OK hoch · O₂ · KEIN Volumen · Transport\nAnaphylaktisch: Adrenalin · Schocklagerung · O₂\nSeptisch: O₂ · Schocklagerung · Wärme · Transport\nNeurogen: HWS immob.! · Flachlagerung · O₂\nObstruktiv: Ursache behandeln · O₂ · Transport\n\nMerksatz: O₂, Lagerung, Wärme, Transport. Dann Ursache!" },
    { id: "transport",    titel: "Transportlagerung – Übersicht",      tags: ["Transport","Lagerung"], inhalt: "OK hoch 30–45°: Herzinfarkt, Atemnot, Schlaganfall (bewusst)\nSitzend: Starke Atemnot – Position vom Patienten wählen lassen\nSchocklagerung (Beine hoch): Hypovolämisch, Anaphylaxie\n  NICHT bei: SHT, Wirbelsäule, kardiogenem Schock!\nStabile Seitenlage: Bewusstlos, Atmung vorhanden\nFlach / Vakuummatratze: Wirbelsäule, Polytrauma\nExtremitäten: ruhigstellen, polstern, erhöht lagern" },
    { id: "WASB",         titel: "WASB – Bewusstseinsskala",           tags: ["VH","Bewusstsein","Neurologie"], inhalt: "W = Wach: Patient ist wach und ansprechbar\nA = Ansprechbar: Reagiert auf Ansprechen\nS = Somnolent: Reagiert nur auf Schmerzreiz\nB = Bewusstlos: Keine Reaktion\n\nSchnelle Einschätzung vor dem GCS – im Erst-Assessment einsetzen." },
    { id: "waldbrand",    titel: "Waldbrand – Einsatzgrundsätze",      tags: ["Waldbrand","TLF"],      inhalt: "Fahrzeuge:\n→ TLF 16/25 (01/22-01): an der Einsatzstelle (stärkere Pumpe)\n→ TLF 24/50 (01/24-01): Wasser-Pendel-Verkehr\n\nSchutzkleidung: TH-Kleidung – KEINE Nomex!\n\nGrundsätze:\n→ Windrichtung beachten – nie dagegen arbeiten\n→ Fluchtweg immer freihalten\n→ Wasserbecken aufbauen\n→ Rückzug sofort wenn Feuer die Flanke überholt" }
  ]
};

// ── STATE ──────────────────────────────────────────────────────────────────────
let state = { screen: 'start', einsatzId: null, positionId: null };

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  const nav = document.getElementById('header-nav');
  content.className = 'content fade-in';
  // force reflow for animation
  void content.offsetWidth;

  // Header-Navigation
  nav.innerHTML = '';
  nav.style.display = 'flex';
  if (state.screen !== 'start') {
    if (state.screen === 'wiki') {
      const b1 = btn('← Startseite', () => { state = { screen: 'start', einsatzId: null, positionId: null }; render(); });
      b1.className = 'btn-zurueck';
      nav.appendChild(b1);
    }
    if (state.screen === 'aufgaben') {
      const b1 = btn('← Startseite', () => { state = { screen: 'start', einsatzId: null, positionId: null }; render(); });
      b1.className = 'btn-zurueck';
      nav.appendChild(b1);
    }
  }

  // Screens
  if (state.screen === 'start')       renderStart(content);
  else if (state.screen === 'positionen') renderPositionen(content);
  else if (state.screen === 'aufgaben')   renderAufgaben(content);
  else if (state.screen === 'wiki')       renderWiki(content);
}

function renderStart(el) {
  el.innerHTML = '';

  // Einsatzstichworte
  el.appendChild(el_('div', { className: 'screen-titel' }, 'Einsatzstichwort wählen'));

  DATA.einsaetze.forEach(e => {
    const b = btn_einsatz(e);
    b.addEventListener('click', () => {
      state = { screen: 'aufgaben', einsatzId: e.id, positionId: 'ALLE' };
      render();
    });
    el.appendChild(b);
  });

  // Wiki
  const bw = document.createElement('button');
  bw.className = 'btn-einsatz';
  bw.innerHTML = `
    <div class="btn-einsatz-icon icon-wiki">📖</div>
    <div class="btn-einsatz-text">
      <div class="btn-einsatz-kurz">WIKI</div>
      <div class="btn-einsatz-lang">Begriffe & Merksätze nachschlagen</div>
    </div>
    <div class="btn-einsatz-pfeil">›</div>`;
  bw.addEventListener('click', () => { state = { screen: 'wiki', einsatzId: null, positionId: null }; render(); });
  el.appendChild(bw);

  // Schnellsuche am Ende
  el.appendChild(el_('div', { className: 'screen-titel', style: 'margin-top:8px' }, 'Schnellsuche Wiki'));
  const sucheWrap = document.createElement('div');
  sucheWrap.className = 'start-suche-wrap';
  const sucheInput = document.createElement('input');
  sucheInput.className = 'start-suche';
  sucheInput.type = 'search';
  sucheInput.placeholder = '🔍  z.B. Status, cABCDE, Schock …';
  sucheWrap.appendChild(sucheInput);
  el.appendChild(sucheWrap);
  const sucheErgebnis = document.createElement('div');
  sucheErgebnis.className = 'start-suche-ergebnis';
  el.appendChild(sucheErgebnis);

  sucheInput.addEventListener('input', () => {
    const q = sucheInput.value.toLowerCase().trim();
    sucheErgebnis.innerHTML = '';
    if (!q) return;
    const treffer = DATA.wiki.filter(w =>
      w.titel.toLowerCase().includes(q) ||
      w.tags.some(t => t.toLowerCase().includes(q)) ||
      w.inhalt.toLowerCase().includes(q)
    );
    if (treffer.length === 0) {
      sucheErgebnis.appendChild(el_('div', { className: 'leer' }, 'Kein Eintrag gefunden.'));
      return;
    }
    treffer.forEach(w => {
      const card = document.createElement('div');
      card.className = 'wiki-eintrag';
      card.innerHTML = `
        <div class="wiki-eintrag-header">
          <div>
            <div class="wiki-eintrag-titel">${w.titel}</div>
            <div class="wiki-eintrag-tags">${w.tags.map(t => `<span class="wiki-tag">${t}</span>`).join('')}</div>
          </div>
          <div class="wiki-pfeil">›</div>
        </div>
        <div class="wiki-inhalt">${w.inhalt}</div>`;
      const schliessenBtn = document.createElement('button');
      schliessenBtn.className = 'wiki-schliessen';
      schliessenBtn.textContent = '∧ Schließen';
      schliessenBtn.addEventListener('click', () => {
        card.classList.remove('offen');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
      card.querySelector('.wiki-inhalt').after(schliessenBtn);
      card.querySelector('.wiki-eintrag-header').addEventListener('click', () => card.classList.toggle('offen'));
      sucheErgebnis.appendChild(card);
    });
  });
}

function renderPositionen(el) {
  el.innerHTML = '';
  const einsatz = DATA.einsaetze.find(e => e.id === state.einsatzId);
  if (!einsatz) return;

  // Fahrzeug-Info
  const info = document.createElement('div');
  info.className = 'info-fahrzeug';
  info.innerHTML = `<strong>${einsatz.kurz} – ${einsatz.label}</strong>Fahrzeug: ${einsatz.fahrzeug}`;
  el.appendChild(info);

  el.appendChild(el_('div', { className: 'screen-titel' }, 'Meine Einsatzposition'));

  const grid = document.createElement('div');
  grid.className = 'grid-positionen';

  // ALLE zuerst
  const bAlle = document.createElement('button');
  bAlle.className = 'btn-position alle';
  bAlle.innerHTML = `<div class="pos-kurz">ALLE</div><div class="pos-lang">Übersicht aller Trupps</div>`;
  bAlle.addEventListener('click', () => {
    state.positionId = 'ALLE'; state.screen = 'aufgaben'; render();
  });
  grid.appendChild(bAlle);

  // Positionen aus Daten (ohne ALLE)
  const positionen = einsatz.id === 'VH'
    ? [{ id: 'ALLE', label: 'Alle' }]
    : [
        { id: 'MA', label: 'Maschinist' },
        { id: 'A',  label: 'Angriffstrupp' },
        { id: 'W',  label: 'Wassertrupp' },
        { id: 'S',  label: 'Schlauchtrupp' },
        { id: 'ME', label: 'Melder' }
      ];

  if (einsatz.id !== 'VH') {
    positionen.forEach(p => {
      const b = document.createElement('button');
      b.className = 'btn-position';
      b.innerHTML = `<div class="pos-kurz">${p.id}</div><div class="pos-lang">${p.label}</div>`;
      b.addEventListener('click', () => {
        state.positionId = p.id; state.screen = 'aufgaben'; render();
      });
      grid.appendChild(b);
    });
  }

  el.appendChild(grid);
}

function renderAufgaben(el) {
  el.innerHTML = '';
  const einsatz = DATA.einsaetze.find(e => e.id === state.einsatzId);
  if (!einsatz) return;

  const zeigeAlle = state.positionId === 'ALLE';
  const posLabel = zeigeAlle ? 'Alle Trupps' : (
    { MA: 'Maschinist', A: 'Angriffstrupp', W: 'Wassertrupp', S: 'Schlauchtrupp', ME: 'Melder' }[state.positionId] || state.positionId
  );

  // Header – nur Einsatzstichwort groß in Rot
  const hdr = document.createElement('div');
  hdr.className = 'aufgaben-header';
  hdr.innerHTML = `<div class="aufgaben-header-titel">${einsatz.label}</div>`;
  el.appendChild(hdr);

  if (zeigeAlle && einsatz.id === 'VH') {
    // VH: Aufgaben in thematische eingeklappte Karten gruppiert
    const gruppen = [
      { titel: 'Einsatzstelle – Situation – Sicherheit',       aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr <= 5) },
      { titel: '4-S-Regel – Einsatzbeginn',                    aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 100 && a.nr <= 103) },
      { titel: 'Erster Eindruck – 4-Sekunden-Regel',           aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr === 104) },
      { titel: 'Ersteinschätzung – Schnelles ABC',             aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 6 && a.nr <= 11) },
      { titel: 'Notfallanamnese – SAMPLE & OPQRST',            aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 40 && a.nr <= 49) },
      { titel: 'cABCDE – Patientenuntersuchung',               aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 12 && a.nr <= 17) },
      { titel: 'Schlaganfall erkennen & handeln',              aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 20 && a.nr <= 29) },
      { titel: 'Krampfanfall – Maßnahmen',                     aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 30 && a.nr <= 39) },
      { titel: 'Glasgow Coma Scale (GCS)',                     aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 50 && a.nr <= 59) },
      { titel: "H's & HITS – Ursachen Kreislaufstillstand",    aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 60 && a.nr <= 64) },
      { titel: 'i-gel – Atemwegshilfe',                        aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 65 && a.nr <= 69) },
      { titel: 'Leitstelle & Übergabe',                        aufgaben: einsatz.positionen[0].aufgaben.filter(a => a.nr >= 18 && a.nr <= 19) }
    ];
    gruppen.forEach(g => el.appendChild(aufgabenKarte(g.titel, g.aufgaben, false)));

  } else if (zeigeAlle) {
    // Alle Trupps als eingeklappte Karten
    einsatz.positionen.forEach(pos => {
      el.appendChild(aufgabenKarte(`${pos.id} – ${pos.label}`, pos.aufgaben, false));
    });
  } else {
    // Einzelne Position: Karte initial aufgeklappt
    const pos = einsatz.positionen.find(p => p.id === state.positionId);
    if (!pos) { el.appendChild(el_('div', { className: 'leer' }, 'Keine Daten für diese Position.')); return; }
    el.appendChild(aufgabenKarte(`${pos.id} – ${pos.label}`, pos.aufgaben, true));
  }
}

function renderWiki(el) {
  el.innerHTML = '';
  el.appendChild(el_('div', { className: 'screen-titel' }, 'Wiki – Begriffe & Merksätze'));

  const wrap = document.createElement('div');
  wrap.className = 'wiki-search-wrap';
  const input = document.createElement('input');
  input.className = 'wiki-search';
  input.type = 'search';
  input.placeholder = '🔍  Suchen …';
  wrap.appendChild(input);
  el.appendChild(wrap);

  const liste = document.createElement('div');
  liste.className = 'wiki-liste';
  el.appendChild(liste);

  function renderListe(filter) {
    liste.innerHTML = '';
    const eintraege = [...DATA.wiki]
      .sort((a, b) => a.titel.localeCompare(b.titel, 'de'))
      .filter(w => !filter || w.titel.toLowerCase().includes(filter) || w.tags.some(t => t.toLowerCase().includes(filter)));

    if (eintraege.length === 0) {
      liste.appendChild(el_('div', { className: 'leer' }, 'Keine Einträge gefunden.'));
      return;
    }
    eintraege.forEach(w => {
      const card = document.createElement('div');
      card.className = 'wiki-eintrag';
      card.innerHTML = `
        <div class="wiki-eintrag-header">
          <div>
            <div class="wiki-eintrag-titel">${w.titel}</div>
            <div class="wiki-eintrag-tags">${w.tags.map(t => `<span class="wiki-tag">${t}</span>`).join('')}</div>
          </div>
          <div class="wiki-pfeil">›</div>
        </div>
        <div class="wiki-inhalt">${w.inhalt}</div>`;
      // Schließen-Button
      const schliessenBtn = document.createElement('button');
      schliessenBtn.className = 'wiki-schliessen';
      schliessenBtn.textContent = '∧ Schließen';
      schliessenBtn.addEventListener('click', () => {
        card.classList.remove('offen');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
      card.querySelector('.wiki-inhalt').after(schliessenBtn);
      card.querySelector('.wiki-eintrag-header').addEventListener('click', () => {
        card.classList.toggle('offen');
      });
      liste.appendChild(card);
    });
  }

  renderListe('');
  input.addEventListener('input', () => renderListe(input.value.toLowerCase().trim()));
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el_(tag, props, text) {
  const e = document.createElement(tag);
  Object.assign(e, props);
  if (text) e.textContent = text;
  return e;
}
function btn(text, onClick) {
  const b = document.createElement('button');
  b.textContent = text;
  b.addEventListener('click', onClick);
  return b;
}
function btn_einsatz(e) {
  const b = document.createElement('button');
  b.className = 'btn-einsatz';
  b.innerHTML = `
    <div class="btn-einsatz-icon ${e.iconKlasse}">${e.icon}</div>
    <div class="btn-einsatz-text">
      <div class="btn-einsatz-kurz">${e.kurz}</div>
      <div class="btn-einsatz-lang">${e.label}</div>
      <div class="btn-einsatz-fzg">${e.fahrzeug}</div>
    </div>
    <div class="btn-einsatz-pfeil">›</div>`;
  return b;
}
function aufgabenKarte(titel, aufgaben, initialOffen) {
  const card = document.createElement('div');
  card.className = 'wiki-eintrag' + (initialOffen ? ' offen' : '');
  const header = document.createElement('div');
  header.className = 'wiki-eintrag-header';
  header.innerHTML = `<div class="wiki-eintrag-titel">${titel}</div><div class="wiki-pfeil">›</div>`;
  const body = document.createElement('div');
  body.className = 'wiki-inhalt';
  body.style.padding = '0';
  aufgaben.forEach(a => body.appendChild(aufgabeEl(a)));
  // Schließen-Button am Ende
  const schliessenBtn = document.createElement('button');
  schliessenBtn.className = 'wiki-schliessen';
  schliessenBtn.textContent = '∧ Schließen';
  schliessenBtn.addEventListener('click', () => {
    card.classList.remove('offen');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
  body.appendChild(schliessenBtn);
  header.addEventListener('click', () => card.classList.toggle('offen'));
  card.appendChild(header);
  card.appendChild(body);
  return card;
}
function aufgabeEl(a) {
  const div = document.createElement('div');
  div.className = 'aufgabe-item';
  div.innerHTML = `
    <div class="aufgabe-nr">${a.nr}</div>
    <div class="aufgabe-inhalt">
      <div class="aufgabe-text">${a.text}</div>
      ${a.merksatz ? `<div class="aufgabe-merksatz">▶ ${a.merksatz}</div>` : ''}
    </div>`;

  // Inline Wiki-Aufklapper wenn wikiId vorhanden
  if (a.wikiId) {
    const wiki = DATA.wiki.find(w => w.id === a.wikiId);
    if (wiki) {
      const inhalt = div.querySelector('.aufgabe-inhalt');
      const wikiBtn = document.createElement('button');
      wikiBtn.className = 'aufgabe-wiki-btn';
      wikiBtn.innerHTML = `ℹ ${wiki.titel}`;
      const wikiBox = document.createElement('div');
      wikiBox.className = 'aufgabe-wiki-inline';
      wikiBox.textContent = wiki.inhalt;
      const wikiClose = document.createElement('button');
      wikiClose.className = 'aufgabe-wiki-schliessen';
      wikiClose.textContent = '∧ Schließen';
      wikiBox.appendChild(wikiClose);
      wikiBtn.addEventListener('click', () => wikiBox.classList.toggle('offen'));
      wikiClose.addEventListener('click', (e) => {
        e.stopPropagation();
        wikiBox.classList.remove('offen');
      });
      inhalt.appendChild(wikiBtn);
      inhalt.appendChild(wikiBox);
    }
  }
  return div;
}

// ── START ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
